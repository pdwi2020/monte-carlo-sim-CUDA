name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov numpy scipy pybind11
          pip install fastapi uvicorn pydantic
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run tests (Python modules only)
        run: |
          pytest tests/ -v --cov=. --cov-report=xml --ignore=tests/test_cuda.py

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install linters
        run: |
          pip install flake8 black isort

      - name: Check formatting with black
        run: black --check --diff . || true

      - name: Check imports with isort
        run: isort --check-only --diff . || true

      - name: Lint with flake8
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || true

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: |
          pip install build wheel

      - name: Build package
        run: python -m build --wheel || echo "Build skipped (CUDA not available)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
        if: success()

  research-smoke:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run research pipeline smoke test
        run: |
          python - <<'PY'
          from mc_pricer import DiscretizationScheme, MarketData, PayoffType, VarianceReduction
          from research.benchmark import BenchmarkCase, BenchmarkConfig
          from research.pipeline import run_research_pipeline
          case = BenchmarkCase(
              case_id="gbm_eur_call_atm",
              name="GBM European ATM Call",
              model="gbm",
              payoff_type=PayoffType.EUROPEAN_CALL,
              market=MarketData(S0=100.0, r=0.03, q=0.0),
              strike=100.0,
              maturity=1.0,
              sigma=0.2,
          )
          cfg_baseline = BenchmarkConfig(
              label="baseline_mc",
              num_paths=1200,
              num_steps=30,
              variance_reduction=VarianceReduction.NONE,
              scheme=DiscretizationScheme.EULER,
          )
          cfg_candidate = BenchmarkConfig(
              label="vr_mc",
              num_paths=1200,
              num_steps=30,
              variance_reduction=VarianceReduction.ANTITHETIC,
              scheme=DiscretizationScheme.QE,
          )
          out = run_research_pipeline(
              output_dir="artifacts/research_ci",
              seed=17,
              quick=True,
              benchmark_repeats=2,
              mlmc_num_runs=2,
              bootstrap_runs=2,
              diagnostic_num_paths=1200,
              benchmark_cases=[case],
              benchmark_configs=[cfg_baseline, cfg_candidate],
          )
          print(out["artifact_paths"])
          PY

      - name: Verify reproducibility hash bundle
        run: |
          python - <<'PY'
          from research.repro import verify_reproducibility_hash_bundle
          bundle = "artifacts/research_ci/reproducibility_hashes.json"
          check = verify_reproducibility_hash_bundle(bundle)
          print(check)
          if not check.get("valid", False):
              raise SystemExit("Reproducibility hash verification failed")
          PY

      - name: Upload research artifacts
        uses: actions/upload-artifact@v4
        with:
          name: research-smoke
          path: artifacts/research_ci

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t mc-pricer:${{ github.sha }} . || echo "Docker build skipped"
